[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openenv-bug-triage-env"
version = "1.0.0"
description = "An AI-driven bug triage simulation environment for the Meta × OpenEnv Hackathon"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Varshini Gunti", email = "varshini@example.com"}
]
keywords = ["openenv", "bug-triage", "reinforcement-learning", "ai", "hackathon"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence"
]

dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "flask>=2.3.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "requests>=2.31.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "flake8>=6.0.0",
    "mypy>=1.4.0"
]

inference = [
    "openai>=1.0.0"
]

[project.urls]
Homepage = "https://github.com/VarshiniGunti/openenv-bug-triage-env"
Repository = "https://github.com/VarshiniGunti/openenv-bug-triage-env.git"
Documentation = "https://github.com/VarshiniGunti/openenv-bug-triage-env/blob/main/README.md"
Issues = "https://github.com/VarshiniGunti/openenv-bug-triage-env/issues"

[tool.setuptools]
packages = ["models", "tasks", "graders", "utils"]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-v --cov=. --cov-report=html"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
