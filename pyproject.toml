[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openenv-bug-triage-env"
version = "1.0.0"
description = "An AI-driven bug triage simulation environment for the Meta × OpenEnv Hackathon"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Varshini Gunti"}]
keywords = ["openenv", "bug-triage", "reinforcement-learning", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "flask>=2.3.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0", "pytest-cov>=4.1.0"]
inference = ["openai>=1.0.0"]

[project.urls]
Homepage = "https://github.com/VarshiniGunti/openenv-bug-triage-env"
Repository = "https://github.com/VarshiniGunti/openenv-bug-triage-env.git"

[tool.setuptools]
packages = ["models", "tasks", "graders", "utils"]
