[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openenv-bug-triage-env"
version = "1.0.0"
description = "An AI-driven bug triage simulation environment for the Meta × OpenEnv Hackathon"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Varshini Gunti"}]
keywords = ["openenv", "bug-triage", "reinforcement-learning", "ai", "hackathon"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "numpy>=1.24.0",
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "flake8>=6.0.0",
]
inference = [
    "openai>=1.0.0",
    "torch>=2.0.0",
    "transformers>=4.30.0",
]

[project.urls]
Homepage = "https://github.com/VarshiniGunti/openenv-bug-triage-env"
Repository = "https://github.com/VarshiniGunti/openenv-bug-triage-env.git"
Documentation = "https://github.com/VarshiniGunti/openenv-bug-triage-env/blob/main/README.md"

[tool.setuptools]
packages = ["environment", "baseline", "models", "tasks", "graders", "utils"]
